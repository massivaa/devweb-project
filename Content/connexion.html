<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SantéClick — Connexion</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,600;0,700;1,400&family=Outfit:wght@300;400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../Style/Ystyleprofile.css">
  <link rel="stylesheet" href="../index.css">
</head>
<body>

  <!-- Navbar -->
  <nav class="navbar">
    <div class="nav-gauche">Santé<span>Click</span></div>

    <div class="nav-droite">
      <button class="menu-toggle" onclick="toggleMenu()">☰</button>
    </div>
    
    <div class="nav-liens" id="nav-liens">
      <button class="menu-close" onclick="toggleMenu()">×</button>
      <div id="nav-guest">
        <a href="../index.html">Accueil</a>
        <a href="inscription.html" class="nav-cta">S'inscrire</a>
      </div>
      <div id="nav-user">
        <span id="nav-nom"></span>
        <a href="../index.html">Accueil</a>
        <a href="medicament.html">Médicaments</a>
        <a href="Mdocteur.html">Docteurs</a>
        <a href="patient.html" class="active">Profil</a>
        <a href="https://mknay.alwaysdata.net/php/deconnexion.php" style="color:rgba(255,120,120,0.8)">Déconnexion</a>
      </div>
      <button onclick="toggleMode()" title="Mode sombre / clair">◑</button>
    </div>
  </nav>
  <div class="nav-overlay" id="nav-overlay" onclick="toggleMenu()"></div>


  <!-- Page -->
  <div class="form-page">
    <div class="form-card">

      <!-- Header -->
      <div class="form-header">
        <div class="header-icon">
          <img src="https://img.icons8.com/ios/50/lock--v1.png" alt="Connexion">
        </div>
        <h2>Bon retour</h2>
        <p>Connectez-vous à votre espace SantéClick</p>
      </div>

      <!-- Form -->
      <form>

        <div class="field-group">
          <label for="email">Adresse e-mail <span class="required">*</span></label>
          <input type="email" id="email" name="email" placeholder="exemple@email.com" required autocomplete="email">
        </div>

        <div class="field-group">
          <label for="motdepasse">Mot de passe <span class="required">*</span></label>
          <input type="password" name="password" id="motdepasse" minlength="8" required
                 placeholder="Entrez votre mot de passe" autocomplete="current-password">
        </div>

        <div style="text-align:right; margin-bottom:24px; margin-top:-8px;">
          <a href="#" style="font-size:13px; color:#2d5a3f; font-weight:500; text-decoration:none;">
            Mot de passe oublié ?
          </a>
        </div>

        <button type="submit" class="btn-submit">
          Se connecter
        </button>

      </form>

      <div class="form-switch">
        Pas encore de compte ?
        <a href="inscription.html">Créer un compte gratuitement</a>
      </div>

    </div>
  </div>

  <script src="../JavaScript/index.js"></script>
  <script src="../JavaScript/connexion.js"></script>
</body>
</html>
