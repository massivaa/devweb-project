<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formulaire d'Achat</title>
    <link rel="stylesheet" href="../Style/ordonnance.css">
</head>
<body>
  
    <header class="topbar">
        <div class="logo">💊 PharaMed</div>
        <nav class="menu">
            <a href="index.html">Accueil</a>
            <a href="#">Patients</a>
            <a href="index.html">Ordonnances</a>
            <a href="#">Profil</a>
        </nav>
    </header>

    <!-- Main Container -->
    <div class="container">
        <!-- Back Button -->
        <button class="back-btn" onclick="window.history.back()">← Retour</button>

        <!-- Success Message (hidden by default) -->
        <div id="successMessage" class="success-message" style="display: none;">
            ✅ Paiement réussi ! Votre commande a été prise en compte.
        </div>

        <!-- Error Message (hidden by default) -->
        <div id="errorMessage" class="error-message" style="display: none;">
            ❌ Une erreur s'est produite. Veuillez réessayer.
        </div>

        <!-- Order Summary -->
        <div class="form-section">
            <h2>Résumé de la commande</h2>
            <div class="order-summary" id="orderSummary">
                <!-- Summary will be generated by JavaScript -->
            </div>
        </div>

        <!-- Purchase Form -->
        <div class="form-section">
            <h2>Formulaire de Paiement</h2>
            <form id="purchaseForm" onsubmit="traiterPaiement(event)">
                
                <!-- Adresse de Livraison -->
                <h3 style="color: #111827; margin-top: 20px; margin-bottom: 15px;">📍 Adresse de Livraison</h3>
                
                <div class="form-group">
                    <label for="fullName">Nom complet *</label>
                    <input type="text" id="fullName" name="fullName" required placeholder="Ex: Jean Dupont">
                </div>

                <div class="form-group">
                    <label for="email">Email *</label>
                    <input type="email" id="email" name="email" required placeholder="Ex: jean@example.com">
                </div>

                <div class="form-group">
                    <label for="phone">Téléphone *</label>
                    <input type="tel" id="phone" name="phone" required placeholder="Ex: +33612345678">
                </div>

                <div class="form-group">
                    <label for="address">Adresse *</label>
                    <input type="text" id="address" name="address" required placeholder="Ex: 123 Rue de la Paix">
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label for="city">Ville *</label>
                        <input type="text" id="city" name="city" required placeholder="Ex: Paris">
                    </div>
                    <div class="form-group">
                        <label for="postalCode">Code Postal *</label>
                        <input type="text" id="postalCode" name="postalCode" required placeholder="Ex: 75001">
                    </div>
                </div>

                <div class="form-group">
                    <label for="country">Pays *</label>
                    <input type="text" id="country" name="country" required placeholder="Ex: France" value="France">
                </div>

                <!-- Informations Bancaires -->
                <h3 style="color: #111827; margin-top: 30px; margin-bottom: 15px;">💳 Informations Bancaires</h3>

                <div class="form-group">
                    <label for="cardName">Nom du titulaire *</label>
                    <input type="text" id="cardName" name="cardName" required placeholder="Ex: JEAN DUPONT">
                </div>

                <div class="form-group">
                    <label for="cardNumber">Numéro de carte *</label>
                    <input type="text" id="cardNumber" name="cardNumber" required placeholder="1234 5678 9012 3456" maxlength="19" pattern="[0-9\s]{13,19}">
                </div>

                <div class="form-row-3">
                    <div class="form-group">
                        <label for="expiryMonth">Mois d'expiration *</label>
                        <select id="expiryMonth" name="expiryMonth" required>
                            <option value="">Sélectionner</option>
                            <option value="01">01</option>
                            <option value="02">02</option>
                            <option value="03">03</option>
                            <option value="04">04</option>
                            <option value="05">05</option>
                            <option value="06">06</option>
                            <option value="07">07</option>
                            <option value="08">08</option>
                            <option value="09">09</option>
                            <option value="10">10</option>
                            <option value="11">11</option>
                            <option value="12">12</option>
                        </select>
                    </div>

                    <div class="form-group">
                        <label for="expiryYear">Année d'expiration *</label>
                        <select id="expiryYear" name="expiryYear" required>
                            <option value="">Sélectionner</option>
                            <option value="2026">2026</option>
                            <option value="2027">2027</option>
                            <option value="2028">2028</option>
                            <option value="2029">2029</option>
                            <option value="2030">2030</option>
                            <option value="2031">2031</option>
                            <option value="2032">2032</option>
                            <option value="2033">2033</option>
                        </select>
                    </div>

                    <div class="form-group">
                        <label for="cvv">CVV *</label>
                        <input type="text" id="cvv" name="cvv" required placeholder="123" maxlength="4" pattern="[0-9]{3,4}">
                    </div>
                </div>

                <!-- Conditions d'utilisation -->
                <div class="form-group" style="margin-top: 20px;">
                    <label style="display: flex; align-items: center; gap: 10px; font-weight: normal;">
                        <input type="checkbox" id="terms" name="terms" required>
                        J'accepte les conditions d'utilisation et la politique de confidentialité
                    </label>
                </div>

                <!-- Submit Button -->
                <button type="submit" class="submit-btn" style="margin-top: 20px;">💳 Payer et Confirmer la Commande</button>
            </form>
        </div>
    </div>

    <script src="../JavaScript/ordonnance.js"></script>
    <script>
        // Récupérer l'ID de l'ordonnance depuis l'URL
        const urlParams = new URLSearchParams(window.location.search);
        const ordonnanceId = parseInt(urlParams.get('id'));

        // Trouver l'ordonnance correspondante
        const ordonnance = ordonnances.find(ord => ord.id === ordonnanceId);

        if (ordonnance) {
            // Afficher le résumé de la commande
            const summary = document.getElementById("orderSummary");
            
            let totalPrice = 0;
            const medicamentsList = ordonnance.medicaments.map(med => {
                const price = Math.floor(Math.random() * 50) + 10; // Prix aléatoire entre 10 et 60€
                totalPrice += price;
                return `
                    <div class="order-item">
                        <span>${med.name} (${med.dosage})</span>
                        <span>${price}DA</span>
                    </div>
                `;
            }).join("");

            summary.innerHTML = `
                <h3>Ordonnance: ${ordonnance.name}</h3>
                ${medicamentsList}
                <div class="order-total">
                    <span>Total:</span>
                    <span>${totalPrice}DA</span>
                </div>
            `;

            // Stocker le prix total pour la validation
            window.totalPrice = totalPrice;
        }

        function traiterPaiement(event) {
            event.preventDefault();

            // Récupérer les valeurs du formulaire
            const fullName = document.getElementById("fullName").value;
            const email = document.getElementById("email").value;
            const phone = document.getElementById("phone").value;
            const address = document.getElementById("address").value;
            const city = document.getElementById("city").value;
            const postalCode = document.getElementById("postalCode").value;
            const country = document.getElementById("country").value;
            const cardName = document.getElementById("cardName").value;
            const cardNumber = document.getElementById("cardNumber").value;
            const expiryMonth = document.getElementById("expiryMonth").value;
            const expiryYear = document.getElementById("expiryYear").value;
            const cvv = document.getElementById("cvv").value;
            const terms = document.getElementById("terms").checked;

            // Validation simple
            if (!fullName || !email || !phone || !address || !city || !postalCode || !country ||
                !cardName || !cardNumber || !expiryMonth || !expiryYear || !cvv || !terms) {
                document.getElementById("errorMessage").style.display = "block";
                document.getElementById("errorMessage").textContent = "❌ Veuillez remplir tous les champs obligatoires.";
                setTimeout(() => {
                    document.getElementById("errorMessage").style.display = "none";
                }, 5000);
                return;
            }

            // Validation du numéro de carte (simple)
            if (cardNumber.replace(/\s/g, '').length < 13) {
                document.getElementById("errorMessage").style.display = "block";
                document.getElementById("errorMessage").textContent = "❌ Numéro de carte invalide.";
                setTimeout(() => {
                    document.getElementById("errorMessage").style.display = "none";
                }, 5000);
                return;
            }

            // Validation du CVV
            if (cvv.length < 3) {
                document.getElementById("errorMessage").style.display = "block";
                document.getElementById("errorMessage").textContent = "❌ CVV invalide.";
                setTimeout(() => {
                    document.getElementById("errorMessage").style.display = "none";
                }, 5000);
                return;
            }

            // Si tout est valide, afficher le message de succès
            document.getElementById("purchaseForm").style.display = "none";
            document.getElementById("successMessage").style.display = "block";

            // Afficher les détails du paiement
            const successMsg = document.getElementById("successMessage");
            successMsg.innerHTML = `
                <h3>✅ Paiement Réussi!</h3>
                <p><strong>Montant payé:</strong> ${window.totalPrice}DA</p>
                <p><strong>Livraison à:</strong> ${fullName}, ${address}, ${postalCode} ${city}, ${country}</p>
                <p><strong>Email de confirmation:</strong> ${email}</p>
                <p style="margin-top: 20px; font-size: 14px;">Vous recevrez un email de confirmation à ${email}</p>
                <button class="back-btn" onclick="window.location.href='index.html'" style="margin-top: 20px; width: auto;">Retour à l'accueil</button>
            `;
        }
    </script>
</body>
</html>
