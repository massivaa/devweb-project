  <!-- PAGE -->
  <div class="form-page">
  <style>.form-page{flex-direction: column;}</style>
    <!-- TITLE OUTSIDE -->
    <div class="form-card" style="text-align:center; margin-bottom:20px;">
      <h2 style="font-family:'Cormorant Garamond', serif; font-size:32px;">
        Finaliser la commande
      </h2>
      <p style="color:#7a9a7a;">Vérifiez vos informations avant paiement</p>
    </div>

    <!-- ORDER SUMMARY CARD -->
    <div class="form-card" style="margin-bottom:20px;">
      <div class="form-section-title">
        <span>🛒</span> Résumé de la commande
      </div>

      <div class="order-summary" id="orderSummary">
        <!-- rempli par JS -->
      </div>
    </div>

    <!-- PAYMENT CARD -->
    <div class="form-card wide">

      <form id="purchaseForm" onsubmit="traiterPaiement(event)">

        <!-- Adresse -->
        <div class="form-section-title">
          <span>📍</span> Adresse de livraison
        </div>

        <div class="field-group">
          <label>Nom complet <span class="required">*</span></label>
          <input type="text" id="fullName" required>
        </div>

        <div class="field-group">
          <label>Email <span class="required">*</span></label>
          <input type="email" id="email" required>
        </div>

        <div class="field-group">
          <label>Téléphone <span class="required">*</span></label>
          <input type="tel" id="phone" required maxlength="10">
        </div>

        <div class="field-group">
          <label>Adresse <span class="required">*</span></label>
          <input type="text" id="address" required>
        </div>

        <div class="field-row">
          <div class="field-group">
            <label>Ville <span class="required">*</span></label>
            <input type="text" id="city" required>
          </div>
          <div class="field-group">
            <label>Code Postal <span class="required">*</span></label>
            <input type="text" id="postalCode" required>
          </div>
        </div>

        <div class="field-group">
          <label>Pays <span class="required">*</span></label>
          <input type="text" id="country" value="Algérie" required>
        </div>

        <!-- Paiement -->
        <div class="form-section-title">
          <span>💳</span> Informations de paiement
        </div>

        <div class="field-group">
          <label>Nom sur la carte <span class="required">*</span></label>
          <input type="text" id="cardName" required>
        </div>

        <div class="field-group">
          <label>Numéro de carte <span class="required">*</span></label>
          <input type="text" id="cardNumber" required>
        </div>

        <div class="field-row">
          <div class="field-group">
            <label>Mois</label>
            <input type="text" id="expiryMonth" placeholder="MM" required maxlength="2">
          </div>
          <div class="field-group">
            <label>Année</label>
            <input type="text" id="expiryYear" placeholder="YYYY" required maxlength="4">
          </div>
        </div>

        <div class="field-group">
          <label>CVV</label>
          <input type="text" id="cvv" required>
        </div>

        <!-- Terms -->
        <div class="checkbox-group">
          <label class="checkbox-item">
            <input type="checkbox" id="terms" required>
            J'accepte les conditions
          </label>
        </div>

        <!-- BUTTON -->
        <button type="submit" class="btn-submit gold">
          💳 Payer et confirmer la commande
        </button>

      </form>

      <!-- Messages -->
      <div id="successMessage" style="display:none;"></div>
      <div id="errorMessage" style="display:none;"></div>

    </div>

  </div>

  <!-- SCRIPTS -->
  <script src="../JavaScript/index.js"></script>
  <script src="../JavaScript/commande.js"></script>

</body>
